<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Study Planner — Nevyn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root { color-scheme: light dark; }
      html { -webkit-text-size-adjust: 100%; }
      body {
        font-family: var(--font-sans, 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        color: var(--color-text, #0f1115);
        min-height: 100vh;
        background:
          radial-gradient(900px 480px at 8% -10%, rgba(29,158,117,0.10), transparent 55%),
          radial-gradient(900px 480px at 100% -5%, rgba(127,119,221,0.11), transparent 55%),
          radial-gradient(800px 560px at 50% 120%, rgba(24,95,165,0.08), transparent 60%),
          #f7f8fa;
        background-attachment: fixed;
      }
      #root { max-width: 880px; margin: 0 auto; padding: 1.5rem 1.1rem 5rem; }
      ::selection { background: rgba(127,119,221,0.28); }
      /* keyboard focus ring only (no glow on mouse click) */
      :focus-visible { outline: 2px solid #7F77DD; outline-offset: 2px; border-radius: 8px; }
      button:focus:not(:focus-visible), a:focus:not(:focus-visible) { outline: none; }
      /* slim, unobtrusive scrollbars */
      * { scrollbar-width: thin; scrollbar-color: rgba(140,145,155,0.4) transparent; }
      *::-webkit-scrollbar { height: 8px; width: 8px; }
      *::-webkit-scrollbar-thumb { background: rgba(140,145,155,0.35); border-radius: 8px; }
      *::-webkit-scrollbar-track { background: transparent; }
      @media (prefers-color-scheme: dark) {
        body {
          /* color + font already follow CSS vars from tokens.css; only the
             gradient intensities change in dark mode (base is var(--color-bg)) */
          background:
            radial-gradient(900px 480px at 8% -10%, rgba(29,158,117,0.16), transparent 55%),
            radial-gradient(900px 480px at 100% -5%, rgba(127,119,221,0.17), transparent 55%),
            radial-gradient(800px 560px at 50% 120%, rgba(24,95,165,0.14), transparent 60%),
            var(--color-bg, #0a0b0e);
        }
      }
      @media (max-width: 560px) { #root { padding: 1.1rem 0.85rem 4rem; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

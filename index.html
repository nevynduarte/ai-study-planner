<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Study Planner — Nevyn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /*
       * Minimal base reset — visual appearance (backgrounds, focus rings, colors)
       * is now in src/tokens.css using Open Props CSS custom properties.
       * This block only covers structural resets and things needed before the
       * JS bundle loads (scrollbar style, #root layout, font smoothing).
       */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root { color-scheme: light dark; }
      html { -webkit-text-size-adjust: 100%; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        color: #0f1115;
        min-height: 100vh;
      }
      @media (prefers-color-scheme: dark) { body { color: #e9ebf0; } }
      #root { max-width: 880px; margin: 0 auto; padding: 1.5rem 1.1rem 5rem; }
      ::selection { background: rgba(127, 119, 221, 0.28); }
      /* Non-keyboard focus suppressed; keyboard ring defined in tokens.css */
      button:focus:not(:focus-visible), a:focus:not(:focus-visible) { outline: none; }
      /* Slim, unobtrusive scrollbars */
      * { scrollbar-width: thin; scrollbar-color: rgba(140,145,155,0.4) transparent; }
      *::-webkit-scrollbar { height: 8px; width: 8px; }
      *::-webkit-scrollbar-thumb { background: rgba(140,145,155,0.35); border-radius: 8px; }
      *::-webkit-scrollbar-track { background: transparent; }
      @media (max-width: 560px) { #root { padding: 1.1rem 0.85rem 4rem; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

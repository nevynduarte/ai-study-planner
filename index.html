<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Study Planner — Nevyn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /*
       * Base styles for ai-study-planner.
       * All color/shadow/spacing values reference --asp-* semantic tokens
       * (defined in src/tokens.css, which loads Open Props as its primitive
       * foundation).  Hardcoded literals belong in tokens.css, not here.
       */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root { color-scheme: light dark; }
      html { -webkit-text-size-adjust: 100%; }
      body {
        font-family: var(--asp-font-body, 'Inter', system-ui, sans-serif);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        color: var(--asp-text, #0f1115);
        min-height: 100vh;
        background:
          radial-gradient(900px 480px at 8% -10%,
            rgba(var(--asp-brand-aaru-rgb, 29, 158, 117), 0.10), transparent 55%),
          radial-gradient(900px 480px at 100% -5%,
            rgba(var(--asp-brand-equi-rgb, 127, 119, 221), 0.11), transparent 55%),
          radial-gradient(800px 560px at 50% 120%,
            rgba(var(--asp-brand-primary-rgb, 24, 95, 165), 0.08), transparent 60%),
          var(--asp-surface-2, #f7f8fa);
        background-attachment: fixed;
      }
      #root { max-width: 880px; margin: 0 auto; padding: 1.5rem 1.1rem 5rem; }
      ::selection {
        background: rgba(var(--asp-brand-equi-rgb, 127, 119, 221), 0.28);
      }
      /* keyboard focus ring — visible only on keyboard navigation */
      :focus-visible {
        outline: 2px solid var(--asp-brand-equi, #7F77DD);
        outline-offset: 2px;
        border-radius: var(--asp-radius-sm, 5px);
      }
      button:focus:not(:focus-visible), a:focus:not(:focus-visible) { outline: none; }
      /* slim, unobtrusive scrollbars */
      * { scrollbar-width: thin; scrollbar-color: rgba(140,145,155,0.4) transparent; }
      *::-webkit-scrollbar { height: 8px; width: 8px; }
      *::-webkit-scrollbar-thumb { background: rgba(140,145,155,0.35); border-radius: 8px; }
      *::-webkit-scrollbar-track { background: transparent; }
      @media (prefers-color-scheme: dark) {
        body {
          color: var(--asp-text, #e9ebf0);
          background:
            radial-gradient(900px 480px at 8% -10%,
              rgba(var(--asp-brand-aaru-rgb, 29, 158, 117), 0.16), transparent 55%),
            radial-gradient(900px 480px at 100% -5%,
              rgba(var(--asp-brand-equi-rgb, 127, 119, 221), 0.17), transparent 55%),
            radial-gradient(800px 560px at 50% 120%,
              rgba(var(--asp-brand-primary-rgb, 24, 95, 165), 0.14), transparent 60%),
            var(--asp-bg, #0a0b0e);
        }
      }
      @media (max-width: 560px) { #root { padding: 1.1rem 0.85rem 4rem; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Study Planner — Nevyn</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        color: #111;
        min-height: 100vh;
        background:
          radial-gradient(1100px 520px at 12% -8%, rgba(29,158,117,0.12), transparent 60%),
          radial-gradient(1000px 520px at 95% 0%, rgba(127,119,221,0.13), transparent 58%),
          radial-gradient(900px 600px at 50% 115%, rgba(24,95,165,0.10), transparent 60%),
          #f6f7f9;
        background-attachment: fixed;
      }
      #root { max-width: 820px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
      @media (prefers-color-scheme: dark) {
        body {
          color: #e8e8e8;
          background:
            radial-gradient(1100px 520px at 12% -8%, rgba(29,158,117,0.18), transparent 60%),
            radial-gradient(1000px 520px at 95% 0%, rgba(127,119,221,0.18), transparent 58%),
            radial-gradient(900px 600px at 50% 115%, rgba(24,95,165,0.16), transparent 60%),
            #0c0d10;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

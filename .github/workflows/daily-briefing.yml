name: Daily AI Study Briefing

on:
  schedule:
    # 11:00 UTC = 6:00 AM ET (EST). For EDT (summer) change to 10:00.
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run daily briefing
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TWILIO_ACCOUNT_SID:  ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:   ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER:  ${{ secrets.TWILIO_FROM_NUMBER }}
          TO_PHONE_NUMBER:     ${{ secrets.TO_PHONE_NUMBER }}
          CURRENT_MONTH:       ${{ secrets.CURRENT_MONTH }}
        run: node scripts/daily-briefing.js

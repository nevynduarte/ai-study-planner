name = "ai-study-planner"
main = "worker/index.js"
compatibility_date = "2026-06-14"

# Static React app (vite build output) served by the Worker.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Cloudflare D1 — P620 writes results here; the Worker reads them.
# Created with: wrangler d1 create ai-study-planner
[[d1_databases]]
binding = "DB"
database_name = "ai-study-planner"
database_id = "939b4fed-f61f-4094-a3df-35af8fb751ca"
